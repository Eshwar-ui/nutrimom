# Render Blueprint — API (NestJS) + managed Postgres.
# Connect this repo once at https://dashboard.render.com → New → Blueprint.
# After that, every push to `master` auto-deploys the API (autoDeploy: true).
# Fill the `sync: false` vars in the Render dashboard (they are secrets / per-env).

databases:
  - name: nutrimom-db
    databaseName: nutrimom
    user: nutrimom
    plan: free
    region: singapore # closest free region to India users

services:
  - type: web
    name: nutrimom-api
    runtime: node
    plan: free
    region: singapore # must match the database region for private networking
    branch: master
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @nutrimom/shared build &&
      pnpm --filter api exec prisma generate &&
      pnpm --filter api build
    # migrate deploy is idempotent (no-op when there are no pending migrations),
    # so running it on start is safe on the free plan (no preDeploy hook there).
    # NOTE: if the database already has tables from a pre-migrations `db push`
    # deploy, migrate deploy fails once with P3005 — see RUNBOOK "Migrations".
    startCommand: >-
      pnpm --filter api exec prisma migrate deploy &&
      pnpm --filter api start:prod
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Postgres — both point at the same instance (Render PG is unpooled).
      - key: DATABASE_URL
        fromDatabase:
          name: nutrimom-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: nutrimom-db
          property: connectionString
      # Auth secrets — generated once by Render, then held stable.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Set these in the Render dashboard:
      - key: CORS_ORIGIN
        sync: false # your Vercel web URL(s), comma-separated, no trailing slash
        # e.g. https://nutrimom.vercel.app,https://web-sage-ten-z6ut2ocum8.vercel.app
      - key: PAYMENT_PROVIDER
        value: razorpay
      - key: SHIPPING_PROVIDER
        value: manual
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # Supabase Storage — listing photos. Service-role key is server-only.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: listing-images
      - key: ADMIN_EMAIL
        sync: false # optional — for the seeded admin login
      - key: ADMIN_PASSWORD
        sync: false # optional
      # Web origin used to build links sent in emails (password reset) — your
      # Vercel production URL, no trailing slash.
      - key: WEB_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false # must be on a domain verified in your Resend account
